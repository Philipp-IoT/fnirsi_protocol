site_name: FNIRSI DPS-150 Protocol
site_description: Reverse engineering and Python CLI demo for the FNIRSI DPS-150 power supply
repo_url: https://github.com/Philipp-IoT/fnirsi_protocol
repo_name: Philipp-IoT/fnirsi_protocol
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - content.code.copy
    - content.code.annotate
    - navigation.tabs
    - navigation.expand
    - navigation.top
    - search.highlight
    - toc.follow

nav:
  - Home: index.md
  - Protocol:
      - Specification: protocol/spec.md
      - Reference: protocol/reference.md
      - Session Lifecycle: protocol/session.md
      - Captures: protocol/captures.md
  - Reverse Engineering:
      - Methodology: re_methodology.md
  - Python Library:
      - API Reference: dev/api.md
      - Developer Setup: dev/setup.md
      - Contributing: dev/contributing.md
  - Architecture (ARC42):
      - Overview: arc42/index.md
      - "1. Introduction and Goals": arc42/01_introduction_and_goals.md
      - "2. Architecture Constraints": arc42/02_constraints.md
      - "3. System Scope and Context": arc42/03_system_scope_and_context.md
      - "4. Solution Strategy": arc42/04_solution_strategy.md
      - "5. Building Block View": arc42/05_building_block_view.md
      - "6. Runtime View": arc42/06_runtime_view.md
      - "7. Deployment View": arc42/07_deployment_view.md
      - "8. Cross-Cutting Concepts": arc42/08_crosscutting_concepts.md
      - "9. Architecture Decisions": arc42/09_architecture_decisions.md
      - "10. Quality Requirements": arc42/10_quality_requirements.md
      - "11. Risks and Technical Debt": arc42/11_risks_and_technical_debt.md
      - "12. Glossary": arc42/12_glossary.md
  - ADRs:
      - Overview: adr/index.md
      - "ADR-001: Use ARC42": adr/ADR-001-use-arc42.md
      - "ADR-002: Human-Authored Docs": adr/ADR-002-human-authored-docs.md
      - "ADR-003: Vibe-Coding with Claude Code": adr/ADR-003-vibe-coding-claude-code.md
      - "ADR-004: Git for Version Control": adr/ADR-004-git-version-control.md
      - "ADR-005: GitHub for Hosting": adr/ADR-005-github-hosting.md
      - "ADR-006: GitHub Actions for CI": adr/ADR-006-github-actions-ci.md
      - "ADR-007: Conventional Commits": adr/ADR-007-conventional-commits.md
      - "ADR-008: Semantic Release": adr/ADR-008-semantic-release.md

markdown_extensions:
  - admonition
  - tables
  - footnotes
  - def_list
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets:
      base_path: .
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/Philipp-IoT/fnirsi_protocol
