site_name: FNIRSI DPS-150 Protocol
site_description: Reverse engineering and Python CLI demo for the FNIRSI DPS-150 power supply
repo_url: https://github.com/pb-/fnirsi_ps_control
repo_name: pb-/fnirsi_ps_control
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - content.code.copy
    - content.code.annotate
    - navigation.tabs
    - navigation.expand
    - navigation.top
    - search.highlight
    - toc.follow

nav:
  - Home: index.md
  - Protocol:
      - Specification: protocol/spec.md
      - Reference: protocol/reference.md
      - Session Lifecycle: protocol/session.md
      - Captures: protocol/captures.md
  - Reverse Engineering:
      - Methodology: re_methodology.md
  - Python Library:
      - API Reference: dev/api.md
      - Developer Setup: dev/setup.md
      - Contributing: dev/contributing.md

markdown_extensions:
  - admonition
  - tables
  - footnotes
  - def_list
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets:
      base_path: .
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/pb-/fnirsi_ps_control
