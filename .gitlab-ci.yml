default:
  image: python:3.12-slim

variables:
  UV_VERSION: "0.4"
  PIP_NO_CACHE_DIR: "1"

stages:
  - lint
  - test
  - build

# ---------------------------------------------------------------------------
# Shared setup
# ---------------------------------------------------------------------------
.uv_setup: &uv_setup
  before_script:
    - pip install uv==$UV_VERSION --quiet
    - uv sync --extra dev --frozen

# ---------------------------------------------------------------------------
# Lint
# ---------------------------------------------------------------------------
ruff:lint:
  stage: lint
  <<: *uv_setup
  script:
    - uv run ruff check src tests
    - uv run ruff format --check src tests

mypy:
  stage: lint
  <<: *uv_setup
  script:
    - uv run mypy

# ---------------------------------------------------------------------------
# Test
# ---------------------------------------------------------------------------
pytest:
  stage: test
  <<: *uv_setup
  script:
    - uv run pytest --cov=fnirsi_ps_control --cov-report=xml
  coverage: '/TOTAL.*\s+(\d+%)$/'
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml

# ---------------------------------------------------------------------------
# Build (wheel)
# ---------------------------------------------------------------------------
build:wheel:
  stage: build
  <<: *uv_setup
  script:
    - uv build
  artifacts:
    paths:
      - dist/
    expire_in: 1 week
  only:
    - tags
    - main
