name: Release

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run — print next version but do not tag or publish"
        type: boolean
        default: false

permissions:
  contents: write
  id-token: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    name: Semantic Release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dev dependencies
        run: uv sync --extra dev

      - name: ruff format check
        run: uv run ruff format --check src tests

      - name: ruff lint
        run: uv run ruff check src tests

      - name: mypy
        run: uv run mypy

      - name: pytest
        run: uv run pytest

      - name: Print next version (dry run)
        if: inputs.dry_run == true
        run: uv run semantic-release version --print
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Bump version, tag and create GitHub Release
        if: inputs.dry_run == false
        run: uv run semantic-release version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build wheel and sdist
        if: inputs.dry_run == false
        run: uv build

      - name: Upload dist assets to GitHub Release
        if: inputs.dry_run == false
        run: uv run semantic-release publish
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
