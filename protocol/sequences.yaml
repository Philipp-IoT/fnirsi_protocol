# Command sequences for the FNIRSI DPS-150 serial protocol.
#
# This file is the single source of truth for application-layer command
# sequences (request / response / timing relationships).  It is consumed by
# scripts/ksy_to_md.py to auto-generate docs/protocol/reference.md.
#
# The companion file fnirsi_dps150.ksy defines the frame structure and is the
# source of truth for individual command IDs and payload formats.
#
# Fields per step:
#   step        : ordinal (1-based)
#   direction   : tx | rx | delay
#   cmd         : command_id enum name (or display label for opaque frames)
#   start       : start_byte enum name (TX frames only)
#   payload     : human-readable payload description
#   raw_hex     : literal hex bytes (opaque frames that bypass normal encoding)
#   response    : none | {cmd, condition?, payload_type?, length?}
#   retry       : {max, delay_ms}  (polling steps only)
#   interval_ms : push interval in ms (unsolicited RX steps only)
#   note        : free-text annotation
#   example     : {label, tx?, rx?, rx_label?, rx_truncated?, opaque?}
#                 tx/rx are full wire frames (WITH DIR prefix byte) as hex strings.
#                 All hex values confirmed from live hardware captures (2026-03-29).
#
# Status: CONFIRMED from capture and live hardware test 2026-03-29

sequences:
  - id: connect_handshake
    doc: |
      Mandatory three-step handshake to establish a session.
      Must complete before any active-session command is issued.
    phase: connect
    steps:
      - step: 1
        direction: tx
        cmd: connect_ctrl
        start: connect_ctrl
        payload: "data=0x01"
        response: none
        note: "Wake the device. No response expected."
        example:
          label: "connect"
          tx: "f1 c1 00 01 01 02"
      - step: 2
        direction: delay
        ms: 200
        note: "Allow device initialisation time before polling."
      - step: 3
        direction: tx
        cmd: ready_status
        start: query_or_response
        payload: "data=0x00"
        response:
          cmd: ready_status
          condition: "ready == 1"
        retry:
          max: 10
          delay_ms: 100
        note: "Poll until device signals ready. Retry up to 10× with 100 ms delay."
        example:
          label: "poll"
          tx: "f1 a1 e1 01 00 e2"
          rx: "f0 a1 e1 01 01 e3"
          rx_label: "ready = 1"
      - step: 4
        direction: tx
        cmd: start_session_magic
        raw_hex: "b0 00 01 01 01"
        response: none
        note: "Opaque 5-byte constant. START=0xb0, non-standard checksum. Send as literal bytes."
        example:
          label: "opaque constant"
          tx: "f1 b0 00 01 01 01"
          opaque: true

  - id: set_voltage
    doc: "Set the output voltage set-point. Fire-and-forget — no response."
    phase: active
    steps:
      - step: 1
        direction: tx
        cmd: set_voltage
        start: write_command
        payload: "float32 [V]"
        response: none
        example:
          label: "12.0 V"
          tx: "f1 b1 c1 04 00 00 40 41 46"

  - id: set_current
    doc: "Set the current limit. Fire-and-forget — no response."
    phase: active
    steps:
      - step: 1
        direction: tx
        cmd: set_current
        start: write_command
        payload: "float32 [A]"
        response: none
        example:
          label: "1.5 A"
          tx: "f1 b1 c2 04 00 00 c0 3f c5"

  - id: set_output_enable
    doc: |
      Enable the power output.
      The device echoes the full frame back with START=0xa1.
      This is the only write command that elicits a response.
    phase: active
    steps:
      - step: 1
        direction: tx
        cmd: set_output
        start: write_command
        payload: "data=0x01"
        response:
          cmd: set_output
          condition: "same payload as request"
        note: "Echo uses START=0xa1 (query_or_response)."
        example:
          label: "output enabled"
          tx: "f1 b1 db 01 01 dd"
          rx: "f0 a1 db 01 01 dd"
          rx_label: "echo — DATA=0x01 (enabled)"

  - id: set_output_disable
    doc: |
      Disable the power output.
      The device echoes the full frame back with START=0xa1.
    phase: active
    steps:
      - step: 1
        direction: tx
        cmd: set_output
        start: write_command
        payload: "data=0x00"
        response:
          cmd: set_output
          condition: "same payload as request"
        note: "Echo uses START=0xa1 (query_or_response)."
        example:
          label: "output disabled"
          tx: "f1 b1 db 01 00 dc"
          rx: "f0 a1 db 01 00 dc"
          rx_label: "echo — DATA=0x00 (disabled)"

  - id: get_full_status
    doc: "Query the complete device state blob (139 bytes)."
    phase: active
    steps:
      - step: 1
        direction: tx
        cmd: get_full_status
        start: query_or_response
        payload: "data=0x00"
        response:
          cmd: get_full_status
          payload_type: full_status_payload
          length: 139
        note: "Response may be interleaved with unsolicited push frames."
        example:
          label: "query"
          tx: "f1 a1 ff 01 00 00"
          rx: "f0 a1 ff 8b ..."
          rx_label: "139-byte status blob"
          rx_truncated: true

  - id: get_device_name
    doc: "Query device name. Response is an ASCII string."
    phase: active
    steps:
      - step: 1
        direction: tx
        cmd: get_device_name
        start: query_or_response
        payload: "data=0x00"
        response:
          cmd: get_device_name
          payload_type: string_payload
        example:
          label: "query"
          tx: "f1 a1 de 01 00 df"
          rx: "f0 a1 de 07 44 50 53 2d 31 35 30 8f"
          rx_label: "\"DPS-150\" (7 ASCII bytes)"

  - id: get_hw_version
    doc: "Query hardware version. Response is an ASCII string."
    phase: active
    steps:
      - step: 1
        direction: tx
        cmd: get_hw_version
        start: query_or_response
        payload: "data=0x00"
        response:
          cmd: get_hw_version
          payload_type: string_payload
        example:
          label: "query"
          tx: "f1 a1 e0 01 00 e1"
          rx: "f0 a1 e0 04 56 31 2e 32 cb"
          rx_label: "\"V1.2\" (4 ASCII bytes)"

  - id: get_fw_version
    doc: "Query firmware version. Response is an ASCII string."
    phase: active
    steps:
      - step: 1
        direction: tx
        cmd: get_fw_version
        start: query_or_response
        payload: "data=0x00"
        response:
          cmd: get_fw_version
          payload_type: string_payload
        example:
          label: "query"
          tx: "f1 a1 df 01 00 e0"
          rx: "f0 a1 df 04 56 31 2e 30 c8"
          rx_label: "\"V1.0\" (4 ASCII bytes)"

  - id: push_stream
    doc: |
      Unsolicited periodic data push from device to host, approximately every
      600 ms. No request frame is needed; the device emits these automatically
      once the connect handshake completes.
    phase: active
    steps:
      - step: 1
        direction: rx
        cmd: push_vin_a
        interval_ms: 600
        note: "Input voltage channel A [V]."
        example:
          label: "20.0 V"
          rx: "f0 a1 c0 04 00 00 a0 41 a5"
      - step: 2
        direction: rx
        cmd: push_output
        interval_ms: 600
        note: "Vout [V], Iout [A], Pout [W]."
        example:
          label: "Vout=5.0 V, Iout=1.0 A, Pout=5.0 W"
          rx: "f0 a1 c3 0c 00 00 a0 40 00 00 80 3f 00 00 a0 40 4e"
      - step: 3
        direction: rx
        cmd: push_vin_b
        interval_ms: 600
        note: "Alternate input voltage measurement [V]."
        example:
          label: "20.0 V"
          rx: "f0 a1 e2 04 00 00 a0 41 c7"
      - step: 4
        direction: rx
        cmd: push_max_current
        interval_ms: 600
        note: "Device maximum current constant (5.1 A)."
        example:
          label: "5.1 A"
          rx: "f0 a1 e3 04 33 33 a3 40 30"
      - step: 5
        direction: rx
        cmd: push_vin_c
        interval_ms: 600
        note: "Boost rail voltage [V]."
        example:
          label: "24.0 V"
          rx: "f0 a1 c4 04 00 00 c0 41 c9"

  - id: disconnect
    doc: "Terminate the session. No response expected. Close the serial port after sending."
    phase: disconnect
    steps:
      - step: 1
        direction: tx
        cmd: connect_ctrl
        start: connect_ctrl
        payload: "data=0x00"
        response: none
        note: "Mirror of connect step 1 with data=0x00."
        example:
          label: "disconnect"
          tx: "f1 c1 00 01 00 01"
